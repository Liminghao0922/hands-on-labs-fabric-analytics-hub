trigger:
  branches:
    include:
      - main
  paths:
    include:
      - api/**
      - frontend/**
      - azure-pipelines.yml
      - azure-pipelines-functions.yml
      - azure-pipelines-swa.yml

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'
  FUNCTION_APP_NAME: fileuptest
  AZURE_SERVICE_CONNECTION: your-azure-service-connection
  AZURE_STATIC_WEB_APPS_API_TOKEN: your-static-web-app-token

stages:
  - stage: Deploy
    displayName: Deploy backend and frontend
    jobs:
      - job: DeployFunctionApp
        displayName: Deploy Azure Functions backend
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            displayName: Use Python $(PYTHON_VERSION)
            inputs:
              versionSpec: $(PYTHON_VERSION)

          - script: npm install -g azure-functions-core-tools@4 --unsafe-perm true
            displayName: Install Azure Functions Core Tools

          - script: python -m compileall .
            displayName: Validate Python sources
            workingDirectory: api

          - task: AzureCLI@2
            displayName: Deploy Function App
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd api
                func azure functionapp publish "$(FUNCTION_APP_NAME)" --python --build remote

      - job: DeployStaticWebApp
        displayName: Build and deploy Azure Static Web App
        dependsOn: DeployFunctionApp
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Use Node.js $(NODE_VERSION)
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: |
              cd frontend
              npm ci
              npm run build
            displayName: Build frontend

          - task: AzureStaticWebApp@0
            displayName: Deploy Azure Static Web App
            inputs:
              app_location: frontend
              api_location: ''
              output_location: dist
              skip_app_build: true
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)