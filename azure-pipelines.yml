trigger:
  branches:
    include:
      - main
  paths:
    include:
      - api/**
      - frontend/**
      - azure-pipelines.yml
      - azure-pipelines-functions.yml
      - azure-pipelines-swa.yml

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'
  FUNCTION_APP_NAME: func-lakehouse-filemanagement
  AZURE_SERVICE_CONNECTION: hands-on-labs-fabric-analytics-hub

stages:
  - stage: Deploy
    displayName: Deploy backend and frontend
    jobs:
      - job: DeployFunctionApp
        displayName: Deploy Azure Functions backend
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            displayName: Use Python $(PYTHON_VERSION)
            inputs:
              versionSpec: $(PYTHON_VERSION)

          - script: |
              python -m pip install --upgrade pip
              pip install --target="$(Build.SourcesDirectory)/api/.python_packages/lib/site-packages" -r requirements.txt
            displayName: Install function dependencies
            workingDirectory: api

          - task: ArchiveFiles@2
            displayName: "Archive files"
            inputs:
              rootFolderOrFile: "$(System.DefaultWorkingDirectory)/api"
              includeRootFolder: false
              archiveFile: "$(System.DefaultWorkingDirectory)/build$(Build.BuildId).zip"
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(System.DefaultWorkingDirectory)/build$(Build.BuildId).zip'
              artifactName: 'drop'

          - task: AzureFunctionApp@2
            displayName: Deploy Function App
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              appType: functionAppLinux
              appName: $(FUNCTION_APP_NAME)
              package: $(System.DefaultWorkingDirectory)/build$(Build.BuildId).zip
              deploymentMethod: auto

      - job: DeployStaticWebApp
        displayName: Build and deploy Azure Static Web App
        dependsOn: DeployFunctionApp
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Use Node.js $(NODE_VERSION)
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: AzureStaticWebApp@0
            displayName: Build and deploy Azure Static Web App
            inputs:
              app_location: frontend
              api_location: ''
              output_location: dist
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)